	<body>
		<h2>BACKGROUND-COLOR Y COLORES CLAVE</h2>
		
		<table width="100%" border="1"  cellspacing="2">
			<tr>
				<td class="bg-aqua"><p>AQUA</p></td>
				<td class="bg-black"><p>BLACK</p></td>
				<td class="bg-blue"><p>BLUE</p></td>
				<td class="bg-fuchsia"><p>FUCHSIA</p></td>
				<td class="bg-gray"><p>GRAY</p></td>
				<td class="bg-green"><p>GREEN</p></td>
			</tr>
			<tr>
				<td class="bg-lime"><p>LIME</p></td>
				<td class="bg-maroon"><p>MAROON</p></td>
				<td class="bg-navy"><p>NAVY</p></td>
				<td class="bg-olive"><p>OLIVE</p></td>
				<td class="bg-orange"><p>ORANGE</p></td>
				<td class="bg-purple"><p>PURPLE</p></td>
			</tr>
			<tr>
				<td class="bg-red"><p>RED</p></td>
				<td colspan="2" class="bg-silver"><p>SILVER</p></td>
				<td colspan="3" class="bg-teal"><p>TEAL</p></td>
			</tr>
			<tr>
				<td colspan="3" class="bg-white"><p>WHITE</p></td>
				<td colspan="3" class="bg-yellow"><p>YELLOW</p></td>
			</tr>
		</table>
